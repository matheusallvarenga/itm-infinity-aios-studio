name: PR Validation

on:
  pull_request:
    branches: [main]

jobs:
  pr-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for conventional commits
        run: |
          COMMITS=$(git log --format=%s origin/main..HEAD)
          echo "$COMMITS" | while read line; do
            if ! echo "$line" | grep -qE "^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .+"; then
              echo "::warning::Non-conventional commit: $line"
            fi
          done

      - name: Check package.json version bump
        run: |
          MAIN_VERSION=$(git show origin/main:package.json | grep '"version"' | head -1 | cut -d'"' -f4)
          PR_VERSION=$(cat package.json | grep '"version"' | head -1 | cut -d'"' -f4)
          echo "Main: $MAIN_VERSION | PR: $PR_VERSION"
